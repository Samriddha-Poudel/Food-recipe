<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Recipie</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Recipie Finder</h2>
        <p>Search  mouth watering recipie to satisfy your carvings.</p>
        <div class="search-box">
            <input type="text" placeholder="search for recipe " id="search-input">
            <button onclick="searchrecipie()"> Search</button>
        </div>
    </div>


    <div class="recipes" id="recipes"></div>
<div class="notfound" id="notfound">Search Your Favourite Recipie!

</div>


<div class="popcard" id="popup">
    <button class="btn" onclick="closepopup()">Close</button>
    <h4 id="recipietitle"></h4>
    <p id="details"></p>
</div>
<script src="script.js"></script>
</body>
</html>
